<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobueno AI - Descubre el Futuro</title>
    <link rel="stylesheet" href="/src/lobueno-header.css">
    <link rel="stylesheet" href="/src/style.css">

    <header class="lb-header">
        <div class="lb-nav-container">
            <a href="#" class="lb-logo">

    <main>
        <section class="hero">

        <section class="carousel-wrapper">

            </div>
        </section>

    <footer>
        <p>&copy; 2026 Grupo Lobueno. Hecho para innovar.</p>
